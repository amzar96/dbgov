name: CI

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          version: "latest"

      - run: uv sync --group dev
      - run: make lint
      - run: uv run ruff format --check src/ tests/

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: dbgov
          POSTGRES_PASSWORD: dbgov
          POSTGRES_DB: dbgov_test
        ports:
          - 15432:5432
        options: >-
          --health-cmd="pg_isready -U dbgov -d dbgov_test"
          --health-interval=2s
          --health-timeout=5s
          --health-retries=10

      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_USER: dbgov
          MYSQL_PASSWORD: dbgov
          MYSQL_DATABASE: dbgov_test
        ports:
          - 13306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root -proot"
          --health-interval=2s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          version: "latest"

      - run: uv sync --group dev
      - run: uv run pytest tests/ -v
