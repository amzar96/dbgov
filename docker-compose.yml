services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: dbgov
      POSTGRES_PASSWORD: dbgov
      POSTGRES_DB: dbgov_test
    ports:
      - "15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dbgov -d dbgov_test"]
      interval: 2s
      timeout: 5s
      retries: 10

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: dbgov
      MYSQL_PASSWORD: dbgov
      MYSQL_DATABASE: dbgov_test
    ports:
      - "13306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 2s
      timeout: 5s
      retries: 10
